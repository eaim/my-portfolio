    <path d="M110 214c1-64 31-96 82-96 41 0 74 30 77 74-30-16-59-17-90 2-18 10-35 18-58 20z" fill="#2f5f86"/>
    <path d="M127 240c10 24 29 35 43 35s33-11 43-35v28h-86z" fill="#edf7ff"/>

