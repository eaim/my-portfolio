<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" role="img" aria-labelledby="title desc">
  <title id="title">Professional Woman Portrait</title>
  <desc id="desc">Minimal flat illustration of a female software engineer in a business suit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f7ff"/>
      <stop offset="100%" stop-color="#d9f6ec"/>
    </linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1f5ea8"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f5ea8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="520" height="620" fill="url(#bg)"/>
  <circle cx="430" cy="120" r="70" fill="#10b981" opacity="0.12"/>
  <circle cx="95" cy="520" r="85" fill="#3b82f6" opacity="0.12"/>

